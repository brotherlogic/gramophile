name: Validate PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ["Gemini AI PR Reviewer"]
    types:
      - completed

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.workflow_run.pull_requests[0].head.sha || github.event.workflow_run.head_sha }}
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Vet
        run: |
          go build -v ./...
          go vet ./...

      - name: Check AI Review Addressed
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            PR_NUMBER=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }} --jq '.pull_requests[0].number')
            if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
              # Fallback if pull_requests array is empty (sometimes happens for issue_comment)
              # We can try to find the PR that matches the head_sha of the workflow_run if it's not main
              if [ "${{ github.event.workflow_run.head_sha }}" != "$(git rev-parse HEAD)" ]; then
                 PR_NUMBER=$(gh pr list --state open --json number,headRefOid --jq ".[] | select(.headRefOid == \"${{ github.event.workflow_run.head_sha }}\") | .number")
              fi
            fi

            if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
              echo "Could not find PR number for workflow run. Skipping AI review check."
              exit 0
            fi
          else
            PR_NUMBER=${{ github.event.pull_request.number }}
          fi

          REPO=${{ github.repository }}

          echo "Checking if all changed files are excluded from review..."
          FILES=$(gh pr view $PR_NUMBER --json files --jq '.files[].path')
          # Patterns: .md, .txt, .yml, .yaml, .json, .log, package-lock.json, yarn.lock
          NON_EXCLUDED_FILES=$(echo "$FILES" | grep -vE '\.(md|txt|yml|yaml|json|log)$|package-lock\.json$|yarn\.lock$' || true)

          if [ -z "$NON_EXCLUDED_FILES" ]; then
            echo "All changed files are excluded from Gemini AI review. Skipping review check."
            exit 0
          fi

          echo "Fetching latest commit timestamp..."
          LATEST_COMMIT_DATE=$(gh api repos/$REPO/pulls/$PR_NUMBER/commits --jq '.[-1].commit.committer.date')
          echo "Latest commit date: $LATEST_COMMIT_DATE"

          echo "Fetching latest Gemini AI Code Review timestamp..."
          # Fetch reviews, filter for github-actions[bot] and the specific comment string, get the last one's submitted_at
          LATEST_REVIEW_DATE=$(gh api repos/$REPO/pulls/$PR_NUMBER/reviews --jq '[.[] | select(.user?.login == "github-actions[bot]" and (.body != null) and (.body | contains("Gemini AI Code Review")))] | last | .submitted_at')
          
          if [ -z "$LATEST_REVIEW_DATE" ] || [ "$LATEST_REVIEW_DATE" = "null" ]; then
            echo "::error::No Gemini AI Code Review found. Failing validation."
            exit 1
          fi

          echo "Latest AI review date: $LATEST_REVIEW_DATE"

          # Use Unix timestamps for accurate comparison
          COMMIT_TS=$(date -d "$LATEST_COMMIT_DATE" +%s)
          REVIEW_TS=$(date -d "$LATEST_REVIEW_DATE" +%s)

          if [ "$REVIEW_TS" -gt "$COMMIT_TS" ]; then
            echo "::error::There are unaddressed Gemini AI Code Review comments! Please push a new commit adjusting the code to satisfy the AI Review."
            exit 1
          fi

          echo "All Gemini AI Code Reviews have been addressed by subsequent commits."